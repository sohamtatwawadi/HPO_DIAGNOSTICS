# railway.toml
# Place this in the repo root alongside the Dockerfile.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# PyHPO takes ~15 s to warm up on cold start — give it enough time
# before Railway marks the deployment unhealthy and restarts it.
healthcheckPath = "/api/health"
healthcheckTimeout = 120          # seconds to wait for first 200 response
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
